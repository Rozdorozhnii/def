services:
  web:
    container_name: web
    image: web
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
    env_file:
      - ./web/.env
    volumes:
      - ./web:/app
      - ./packages:/packages
      - /app/node_modules
    restart: always
    depends_on:
      notes:
        condition: service_healthy
      auth:
        condition: service_healthy
      notifications:
        condition: service_healthy
      minio:
        condition: service_healthy
  notes:
    build:
      context: ./api
      dockerfile: ./apps/notes/Dockerfile
      target: development
    container_name: api-notes
    command: pnpm run start:dev notes
    env_file:
      - ./api/apps/notes/.env
    ports:
      - "${NOTES_PORT}:${NOTES_PORT}"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://localhost:${NOTES_PORT}/notes/health || exit 1",
        ]
      interval: 1m
      timeout: 3s
      retries: 5
      start_period: 10s
    volumes:
      - ./api:/usr/src/app
    depends_on:
      db:
        condition: service_healthy

  auth:
    build:
      context: ./api
      dockerfile: ./apps/auth/Dockerfile
      target: development
    container_name: api-auth
    command: pnpm run start:dev auth
    env_file:
      - ./api/apps/auth/.env
    ports:
      - "${AUTH_PORT}:${AUTH_PORT}"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://localhost:${AUTH_PORT}/auth/health || exit 1",
        ]
      interval: 1m
      timeout: 3s
      retries: 5
      start_period: 10s
    volumes:
      - ./api:/usr/src/app
    depends_on:
      db:
        condition: service_healthy

  notifications:
    build:
      context: ./api
      dockerfile: ./apps/notifications/Dockerfile
      target: development
    container_name: api-notifications
    command: pnpm run start:dev notifications
    env_file:
      - ./api/apps/notifications/.env
    ports:
      - "${NOTIFICATIONS_PORT}:${NOTIFICATIONS_PORT}"
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "const c = require('net').createConnection(process.env.TCP_PORT, '0.0.0.0', () => { c.end(); process.exit(0); }); c.on('error', () => process.exit(1));"
      interval: 1m
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
      - ./api:/usr/src/app
    depends_on:
      db:
        condition: service_healthy

  minio:
    image: minio/minio
    container_name: minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web UI → http://localhost:9001
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    restart: always
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mongo-express:
    image: mongo-express
    container_name: mongo-express
    restart: always
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: db
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mongo
    container_name: mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  mongo_data:
  minio_data:
